<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NOVO ACADEMY — Novogenia</title>

    <!-- ===== SECURITY HEADERS (meta fallback for GitHub Pages static hosting) ===== -->
    <!-- Content-Security-Policy: allowlist every source the app needs -->
    <meta http-equiv="Content-Security-Policy" content="
      default-src 'none';
      script-src  'self' blob:;
      style-src   'self' 'unsafe-inline' https://fonts.googleapis.com;
      font-src    'self' https://fonts.gstatic.com;
      img-src     'self' data: blob: https://img.youtube.com https://i.ytimg.com;
      connect-src 'self'
                  https://*.supabase.co
                  wss://*.supabase.co
                  https://fonts.googleapis.com
                  https://fonts.gstatic.com;
      frame-src   https://www.youtube.com https://www.youtube-nocookie.com;
      worker-src  blob:;
      object-src  'none';
      base-uri    'self';
      form-action 'self';
    " />
    <!-- Prevent this page from being embedded in iframes on other origins -->
    <meta http-equiv="X-Frame-Options" content="SAMEORIGIN" />
    <!-- Block MIME-type sniffing -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <!-- Limit referrer leakage -->
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <!-- Disable browser features the app does not use -->
    <meta http-equiv="Permissions-Policy"
          content="camera=(), microphone=(), geolocation=(), payment=(), usb=()" />

    <!-- ===== FONTS ===== -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&family=Caveat:wght@400;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
